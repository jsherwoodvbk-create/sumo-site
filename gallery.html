<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Salt Stats & Sumo — Fan Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Zen+Old+Mincho:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f1e9db; --surface:#fbf7ef; --ink:#26262b; --muted:#6f695d; --line:#e2d9c7;
    --clay:#a9742c; --clay-soft:#e6cf9f; --purple:#6a3d9a; --vermilion:#cf5a2c;
  }
  @media (prefers-color-scheme:dark){
    :root{--bg:#171719; --surface:#212127; --ink:#ece4d4; --muted:#a49c8b; --line:#33333b;
      --clay:#d2a35c; --clay-soft:#40331d; --purple:#b892e4; --vermilion:#e5814f;}
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:16px/1.55 'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  h1,h2{font-family:'Zen Old Mincho',Georgia,'Times New Roman',serif}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1000px;margin:0 auto;padding:0 16px 64px}
  .home{display:inline-block;margin:10px 2px 4px;font-size:13px;color:var(--purple);font-weight:700}

  header{
    background:
      repeating-linear-gradient(178deg, rgba(0,0,0,.14) 0 1px, transparent 1px 4px),
      repeating-linear-gradient(90deg, rgba(0,0,0,.05) 0 2px, transparent 2px 44px),
      linear-gradient(160deg,#6e4826,#432a15);
    color:#fff;border-radius:14px;padding:20px 22px;margin-bottom:22px;border:1px solid #38230f;
    box-shadow:0 8px 22px rgba(50,30,10,.28)}
  header h1{font-size:23px;margin:0 0 2px;font-weight:900}
  header p{margin:0;opacity:.9;font-size:13.5px}

  /* featured crew shot */
  .feature{margin:0 0 26px;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:var(--surface);box-shadow:0 8px 24px rgba(0,0,0,.08)}
  .feature img{display:block;width:100%;height:auto}
  .feature .cap{padding:12px 16px;font-size:14px}
  .feature .cap b{font-family:'Zen Old Mincho',serif}
  .feature .by{color:var(--muted);font-size:12.5px}

  .sechead{font-family:'Zen Old Mincho',Georgia,serif;font-size:15px;font-weight:700;text-transform:uppercase;
    letter-spacing:.08em;color:var(--clay);margin:24px 2px 14px;display:flex;align-items:center;gap:12px}
  .sechead::after{content:"";flex:1;height:1px;background:var(--line)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;
    transition:transform .12s ease, box-shadow .12s ease}
  .card:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.10)}
  .card img{display:block;width:100%;height:230px;object-fit:cover;background:var(--clay-soft)}
  .card .meta{padding:10px 12px}
  .card .meta p{margin:0;font-size:13.5px}
  .card .meta .by{color:var(--muted);font-size:12px;margin-top:3px}

  .empty{background:var(--surface);border:1px dashed var(--line);border-radius:14px;padding:40px 24px;text-align:center;color:var(--muted)}
  .empty .em{font-size:32px;margin-bottom:8px}

  footer{margin-top:34px;text-align:center;font-size:12.5px;color:var(--muted);border-top:1px solid var(--line);padding-top:18px}
</style>
</head>
<body>
<div class="wrap">
  <a class="home" href="index.html">‹ Salt Stats &amp; Sumo home</a>

  <header>
    <h1>Fan Gallery</h1>
    <p>The crew on the road — Paris and wherever the sumo takes us.</p>
  </header>

  <div id="feature"></div>
  <h2 class="sechead">The Crew &amp; the Road</h2>
  <div id="grid" class="grid"></div>

  <footer>
    <b>Salt Stats &amp; Sumo</b> — a Staves &amp; Hoop production for a crew of four. Photos by the crew.
  </footer>
</div>

<script>
  // ---- To add a photo: upload the image file into a "gallery/" folder in the repo,
  //      then add an entry here. Set feature:true for the big top shot (the crew pic).
  const PHOTOS = [
    { src:"crew-tsuna.jpg", caption:"Tying the yokozuna\u2019s tsuna \u2014 all power, seen from above", by:"MJ", feature:true },
    { src:"paris.jpg", caption:"Grand Sumo, Paris", by:"MJ" },
  ];

  const featured = PHOTOS.find(p=>p.feature);
  const rest = PHOTOS.filter(p=>!p.feature);

  if(featured){
    document.getElementById("feature").innerHTML =
      '<div class="feature"><img src="'+featured.src+'" alt="'+(featured.caption||"")+'">'+
      '<div class="cap"><b>'+(featured.caption||"")+'</b>'+
      (featured.by?'<div class="by">— '+featured.by+'</div>':'')+'</div></div>';
  }

  const grid=document.getElementById("grid");
  if(rest.length===0 && !featured){
    grid.outerHTML='<div class="empty"><div class="em">◇</div>Photos are on their way — MJ\'s shots from the road land here soon.</div>';
    document.querySelector(".sechead").style.display="none";
  } else {
    rest.forEach(p=>{
      grid.insertAdjacentHTML("beforeend",
        '<div class="card"><img src="'+p.src+'" alt="'+(p.caption||"")+'">'+
        '<div class="meta"><p>'+(p.caption||"")+'</p>'+
        (p.by?'<div class="by">by '+p.by+'</div>':'')+'</div></div>');
    });
    if(rest.length===0) document.querySelector(".sechead").style.display="none";
  }
</script>
</body>
</html>
