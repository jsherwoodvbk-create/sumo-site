name: Sync Notion (sumo-api -> Match Log)

on:
  workflow_dispatch:            # run by hand to test
    inputs:
      dry_run:
        description: "Dry run? (true = log only, no writes)"
        type: choice
        default: "true"
        options: ["true", "false"]
      probe:
        description: "Enrichment probe: a wrestler's English name (e.g. Aonishiki). Logs their sumo-api profile mapping and writes nothing. Leave blank for a normal run."
        type: string
        default: ""
  schedule:
    # Several attempts across the morning (UTC) = resilient to GitHub dropping any single cron run.
    # Day results post ~09:00–10:00 UTC (evening JST); these span ~04:00 AM–03:00 PM PT.
    # Safe to fire repeatedly: the dedup read skips days already in Match Log, and the completeness
    # guard skips any day whose full slate of bouts hasn't posted yet (so no half-days ever land).
    - cron: "17 11 * * *"       # ~04:17 AM PT
    - cron: "17 13 * * *"       # ~06:17 AM PT
    - cron: "17 15 * * *"       # ~08:17 AM PT
    - cron: "17 17 * * *"       # ~10:17 AM PT
    - cron: "17 22 * * *"       # ~03:17 PM PT — afternoon backstop

concurrency:
  group: sync-notion
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync results into Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN_WRITE }}
          BASHO: "202607"    # PER-BASHO: change each tournament (also in build-standings.mjs + sync-notion.mjs config block). See project "Tournament Rollover" checklist.
          PROBE_NAME: ${{ github.event.inputs.probe }}
          # Manual runs use the dropdown. Scheduled runs use repo variable NOTION_SYNC_DRY_RUN
          # (set to "0" to go live); unset -> scheduled runs stay in safe dry-run mode.
          DRY_RUN: ${{ github.event.inputs.dry_run == 'false' && '0' || (github.event_name == 'schedule' && (vars.NOTION_SYNC_DRY_RUN || '1') || '1') }}
        run: node sync-notion.mjs
