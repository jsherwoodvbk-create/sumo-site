name: Publish standings

on:
  workflow_dispatch: {}          # lets us run it by hand to test
  schedule:
    # Several attempts across the morning (UTC) = resilient to GitHub dropping any single cron run.
    # Rebuilds standings.html from sumo-api and commits only if it changed (so repeats are no-ops
    # until new results land). The MAX_DAY completeness logic keeps the day-picker off scheduled-
    # but-unfought days. Moved into the morning so the site is fresh when Jennie checks it.
    - cron: "32 11 * * *"        # ~04:32 AM PT
    - cron: "32 13 * * *"        # ~06:32 AM PT
    - cron: "32 15 * * *"        # ~08:32 AM PT
    - cron: "32 17 * * *"        # ~10:32 AM PT
    - cron: "32 22 * * *"        # ~03:32 PM PT — afternoon backstop

permissions:
  contents: write                # allow the built-in token to commit

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rebuild standings.html from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node build-standings.mjs

      - name: Commit & push if standings changed
        run: |
          git config user.name "sumo-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet -- standings.html; then
            echo "No change — nothing to publish."
          else
            git add standings.html
            git commit -m "Auto-update standings ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
